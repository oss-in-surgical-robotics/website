<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>HSMR 2026 Workshop: From Code to Care</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Open Sans', sans-serif;
      scroll-behavior: smooth;
      background: linear-gradient(180deg, #eef2fb 0%, #e6ecf7 50%, #eef2fb 100%);
      min-height: 100vh;
    }

    /* Animated background canvas — fixed behind everything */
    #orb-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Top bar — navy, translucent so orbs show through */
    .top-bar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(20, 40, 90, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(20, 40, 90, 0.18);
    }
    header {
      padding: 12px 20px 6px;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    header .subtitle {
      display: block;
      font-size: 14px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    nav.desktop-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      background: transparent;
      align-items: center;
      padding-bottom: 4px;
    }
    nav.desktop-nav a {
      color: #f2f2f2;
      text-align: center;
      padding: 12px 16px;
      text-decoration: none;
      font-size: 16px;
      transition: background-color 0.25s, color 0.25s;
      border-radius: 6px;
      margin: 0 2px;
    }
    nav.desktop-nav a:hover,
    .dropdown:hover .dropbtn {
      background-color: rgba(255, 255, 255, 0.18);
      color: #ffffff;
    }
    .dropdown {
      position: relative;
      display: inline-block;
    }
    .dropbtn {
      background: transparent;
      color: #f2f2f2;
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      font-family: 'Open Sans', sans-serif;
      border-radius: 6px;
    }
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: rgba(20, 40, 90, 0.96);
      backdrop-filter: blur(10px);
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1001;
      border-radius: 6px;
      overflow: hidden;
    }
    .dropdown-content a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      font-size: 15px;
    }
    .dropdown-content a:hover {
      background-color: rgba(255, 255, 255, 0.18);
    }
    .dropdown:hover .dropdown-content {
      display: block;
    }

    .mobile-nav {
      display: none;
      text-align: center;
      padding: 8px 10px 12px;
      background-color: transparent;
    }
    .mobile-nav select {
      font-size: 16px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      width: 90%;
      max-width: 300px;
    }

    /* Content area sits above canvas with translucent card */
    .content {
      position: relative;
      z-index: 1;
      margin-top: 145px;
      padding: 24px 20px 40px;
      width: 100%;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .content-card {
      max-width: 1240px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(20, 40, 90, 0.10),
                  0 2px 8px rgba(37, 117, 252, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.6);
      overflow: hidden;
    }
    /* Iframe auto-grows to fit its content — no inner scrollbar.
       Page-level scrolling handles everything. */
    iframe {
      width: 100%;
      max-width: 100%;
      min-height: 400px;
      border: none;
      overflow: hidden;
      background: transparent;
      display: block;
    }

    @media screen and (max-width: 768px) {
      nav.desktop-nav {
        display: none;
      }
      .mobile-nav {
        display: block;
      }
      header {
        font-size: 20px;
        padding: 10px 16px 4px;
      }
      header .subtitle {
        font-size: 12px;
      }
      .content {
        margin-top: 185px;
        padding: 16px 12px 30px;
      }
    }
  </style>
  <script>
    function resizeFrame() {
      const f = document.getElementById('content-frame');
      if (!f || !f.contentDocument) return;
      try {
        const doc = f.contentDocument;
        // Measure the inner document directly. We do NOT collapse the iframe
        // first — doing so briefly shortens the page and the browser snaps the
        // scroll position upward, causing the "jumping" feel.
        // Because the inner page has its own height: 100% / min-height rules,
        // we measure body.scrollHeight from a doc whose <html> we momentarily
        // let collapse via overflow only, which doesn't affect outer scroll.
        const body = doc.body;
        const htmlEl = doc.documentElement;
        if (!body || !htmlEl) return;

        // Use getBoundingClientRect on body — gives the rendered content height
        // independent of the iframe's current height.
        const bodyHeight = body.getBoundingClientRect().height;
        const scrollHeight = Math.max(body.scrollHeight, htmlEl.scrollHeight);
        // Trust whichever is larger but stable
        const h = Math.max(bodyHeight, scrollHeight);

        // Only update if the change is meaningful — avoids constant 1px jitter
        // from sub-pixel layout shifts that would also nudge the scrollbar.
        const current = parseFloat(f.style.height) || 0;
        if (Math.abs(h - current) > 2) {
          f.style.height = (h + 20) + 'px';
        }
      } catch (e) {
        // Cross-origin or not yet loaded — fall back to a sensible default
        if (!f.style.height) f.style.height = '80vh';
      }
    }

    function loadPage(page) {
      const f = document.getElementById('content-frame');
      f.src = page;
    }

    function onMobileNavChange(selectEl) {
      loadPage(selectEl.value);
    }

    // Resize whenever the iframe finishes loading
    window.addEventListener('DOMContentLoaded', () => {
      const f = document.getElementById('content-frame');
      f.addEventListener('load', () => {
        resizeFrame();
        // Watch the inner doc so resizes (images loading, responsive reflows) also adjust
        try {
          const doc = f.contentDocument;
          if (doc && 'ResizeObserver' in window) {
            const ro = new ResizeObserver(() => resizeFrame());
            ro.observe(doc.documentElement);
          }
          // Also re-measure shortly after load in case fonts/images shift layout
          setTimeout(resizeFrame, 250);
          setTimeout(resizeFrame, 800);
        } catch (e) { /* cross-origin — skip */ }
      });
      window.addEventListener('resize', resizeFrame);
    });
  </script>
</head>
<body>

<canvas id="orb-canvas"></canvas>

<div class="top-bar">
  <header>
    HSMR 2026 Workshop: From Code to Care
    <span class="subtitle">Challenges, Success Stories, and the Future Directions of Open-Source Development in Medical Robotics</span>
  </header>

  <nav class="desktop-nav">
    <a href="#" onclick="loadPage('welcome.html')">Welcome</a>
    <a href="#" onclick="loadPage('program.html')">Program</a>
    <a href="#" onclick="loadPage('speakers.html')">Speakers</a>
    <a href="#" onclick="loadPage('panelists.html')">Panellists</a>
    <a href="#" onclick="loadPage('callforposters.html')">Call for posters</a>
    <a href="#" onclick="loadPage('importantdates.html')">Important Dates</a>
    <!-- <a href="#" onclick="loadPage('FAQ.html')">White Paper</a> -->
    <a href="#" onclick="loadPage('organisers.html')">Organisers</a>
    <div class="dropdown">
      <button class="dropbtn">All years &#9662;</button>
      <div class="dropdown-content">
        <a href="#" onclick="loadPage('2025.html')">2025</a>
        <a href="#" onclick="loadPage('2024.html')">2024</a>
        <a href="#" onclick="loadPage('2023.html')">2023</a>
      </div>
    </div>
  </nav>

  <div class="mobile-nav">
    <select onchange="onMobileNavChange(this)">
      <option value="welcome.html">Welcome</option>
      <option value="program.html">Program</option>
      <option value="speakers.html">Speakers</option>
      <option value="panelists.html">Panellists</option>
      <option value="callforposters.html">Call for posters</option>
      <option value="importantdates.html">Important Dates</option>
      <!-- <option value="FAQ.html">White Paper</option> -->
      <option value="organisers.html">Organisers</option>
      <optgroup label="All years">
        <option value="2025.html">2025</option>
        <option value="2024.html">2024</option>
        <option value="2023.html">2023</option>
      </optgroup>
    </select>
  </div>
</div>

<div class="content">
  <div class="content-card">
    <iframe id="content-frame" src="welcome.html" scrolling="no"></iframe>
  </div>
</div>

<script>
  // Floating orb background — subtle drifting blobs, now in a navy palette
  (function() {
    const canvas = document.getElementById('orb-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Navy-leaning palette
    const palette = [
      'rgba(20, 40, 90, 0.18)',     // deep navy
      'rgba(30, 60, 130, 0.16)',    // mid navy
      'rgba(37, 99, 200, 0.16)',    // royal blue
      'rgba(70, 130, 220, 0.14)',   // soft blue
      'rgba(100, 150, 230, 0.12)',  // pale blue
    ];

    const orbCount = 7;
    const orbs = [];
    for (let i = 0; i < orbCount; i++) {
      orbs.push({
        x: Math.random() * width,
        y: Math.random() * height,
        r: 180 + Math.random() * 220,
        // ~4x faster base drift so the motion is noticeable
        dx: (Math.random() - 0.5) * 1.0,
        dy: (Math.random() - 0.5) * 1.0,
        color: palette[i % palette.length],
        phase: Math.random() * Math.PI * 2,
      });
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      // Faster time scale → quicker sinusoidal wobble
      const t = performance.now() * 0.0015;

      orbs.forEach((orb) => {
        // Larger wobble amplitude on top of the faster drift
        orb.x += orb.dx + Math.sin(t + orb.phase) * 0.8;
        orb.y += orb.dy + Math.cos(t + orb.phase) * 0.8;

        if (orb.x < -orb.r) orb.x = width + orb.r;
        if (orb.x > width + orb.r) orb.x = -orb.r;
        if (orb.y < -orb.r) orb.y = height + orb.r;
        if (orb.y > height + orb.r) orb.y = -orb.r;

        const grad = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r);
        grad.addColorStop(0, orb.color);
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
        ctx.fill();
      });

      if (!reduceMotion) requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

</body>
</html>
